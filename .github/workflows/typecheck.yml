name: Type Check

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - "renovate/*"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/prepare
      - run: pnpm run typecheck
